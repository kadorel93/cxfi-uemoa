<?xml version="1.0" encoding="UTF-8"?>
<!-- VARIANT C : billet en fond atmosphérique, grand format, faible opacité -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Playfair+Display:ital,wght@0,500;1,500&amp;family=Archivo+Black&amp;family=Archivo:wght@300&amp;display=swap');
      .bg       { fill: #FADA00; }
      .meta     { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; fill: #0F0E0C; letter-spacing: 0.08em; }
      .title    { font-family: 'Anton', 'Arial Narrow', 'Arial Black', sans-serif; font-size: 110px; fill: #0F0E0C; letter-spacing: -1px; }
      .subtitle { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 22px; fill: #0F0E0C; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="630"/>

  <!-- Billet en fond : très grand, rotation légère, opacité 0.22 -->
  <image href="../../assets/photo-ed01-billet.png"
         x="0" y="40" width="1400" height="710"
         preserveAspectRatio="xMidYMid slice"
         opacity="0.22"
         transform="rotate(-4 600 315)"/>

  <!-- Titre en noir par-dessus (meilleur contraste sur billet + jaune) -->
  <text x="1140" y="60" text-anchor="end" class="meta">PULSE CX · ÉDITION 01 · AVRIL 2026</text>
  <text x="60" y="220" class="title">LA VÉRITÉ</text>
  <text x="60" y="330" class="title">SUR UN TRANSFERT</text>
  <text x="60" y="440" class="title">QUI N'ARRIVE JAMAIS</text>
  <text x="60" y="486" class="subtitle">Ce qu'un virement Banque → Mobile Money avorté révèle du CX en UEMOA</text>

  <g transform="translate(528, 576) scale(0.30)" fill="#0F0E0C">
    <text x="0" y="82" font-family="'Archivo Black', 'Arial Black', Helvetica, sans-serif" font-size="94" letter-spacing="-2">PULSE</text>
    <text x="340" y="82" font-family="'Archivo', Arial, Helvetica, sans-serif" font-weight="300" font-size="72" letter-spacing="0">CX</text>
    <path d="M 8 106 C 130 152 330 152 468 112" stroke="#0F0E0C" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="468" cy="112" r="9"/>
  </g>
</svg>
