<?xml version="1.0" encoding="UTF-8"?>
<!-- VARIANT B : déchirure diagonale, deux fragments séparés -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Playfair+Display:ital,wght@0,500;1,500&amp;family=Archivo+Black&amp;family=Archivo:wght@300&amp;display=swap');
      .bg       { fill: #FADA00; }
      .meta     { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; fill: #0F0E0C; letter-spacing: 0.08em; }
      .title    { font-family: 'Anton', 'Arial Narrow', 'Arial Black', sans-serif; font-size: 96px; fill: #FFFFFF; letter-spacing: -1px; }
      .subtitle { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 22px; fill: #0F0E0C; }
    </style>
    <filter id="photo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Fragment supérieur-droit : au-dessus de la ligne de déchirure diagonale -->
    <clipPath id="tear-top" clipPathUnits="objectBoundingBox">
      <polygon points="0.10,0 1,0 1,1 0.95,0.92 0.80,0.87 0.65,0.79 0.48,0.67 0.33,0.56 0.22,0.42 0.12,0.25 0.08,0.12"/>
    </clipPath>
    <!-- Fragment inférieur-gauche : en-dessous de la ligne de déchirure -->
    <clipPath id="tear-bottom" clipPathUnits="objectBoundingBox">
      <polygon points="0,0.05 0.06,0.18 0.14,0.32 0.24,0.48 0.38,0.60 0.55,0.72 0.68,0.80 0.82,0.88 0.97,0.95 1,1 0,1"/>
    </clipPath>
  </defs>

  <rect class="bg" width="1200" height="630"/>
  <text x="1140" y="60" text-anchor="end" class="meta">PULSE CX · ÉDITION 01 · AVRIL 2026</text>
  <text x="60" y="210" class="title">LA VÉRITÉ</text>
  <text x="60" y="306" class="title">SUR UN TRANSFERT</text>
  <text x="60" y="402" class="title">QUI N'ARRIVE JAMAIS</text>
  <text x="60" y="448" class="subtitle">Ce qu'un virement Banque → Mobile Money avorté révèle du CX en UEMOA</text>

  <!-- Fragment supérieur-droit (rotation légère, position de base) -->
  <g filter="url(#photo-shadow)">
    <image href="../../assets/photo-ed01-billet.png"
           x="700" y="150" width="480" height="243"
           preserveAspectRatio="xMidYMid meet"
           clip-path="url(#tear-top)"
           transform="rotate(-5 940 270)"/>
  </g>
  <!-- Fragment inférieur-gauche (décalé +35px down +20px right, rotation opposée pour effet de chute) -->
  <g filter="url(#photo-shadow)">
    <image href="../../assets/photo-ed01-billet.png"
           x="720" y="200" width="480" height="243"
           preserveAspectRatio="xMidYMid meet"
           clip-path="url(#tear-bottom)"
           transform="rotate(4 960 320)"/>
  </g>

  <g transform="translate(528, 576) scale(0.30)" fill="#0F0E0C">
    <text x="0" y="82" font-family="'Archivo Black', 'Arial Black', Helvetica, sans-serif" font-size="94" letter-spacing="-2">PULSE</text>
    <text x="340" y="82" font-family="'Archivo', Arial, Helvetica, sans-serif" font-weight="300" font-size="72" letter-spacing="0">CX</text>
    <path d="M 8 106 C 130 152 330 152 468 112" stroke="#0F0E0C" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="468" cy="112" r="9"/>
  </g>
</svg>
