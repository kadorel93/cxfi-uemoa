<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pulse CX · Édition 01 · Avril 2026
  Sujet : PI-SPI, transfert Banque → Mobile Money échoué, silence client UEMOA
  Concept : billet 10 000 FCFA en chute libre, moitié droite déchirée (pastiche Pink)

  Export PNG : ouvrir dans Chrome → DevTools → More tools → Capture full-size screenshot
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Playfair+Display:ital,wght@0,500;1,500&amp;family=Archivo+Black&amp;family=Archivo:wght@300&amp;display=swap');
      .bg       { fill: #FADA00; }
      .meta     { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; fill: #0F0E0C; letter-spacing: 0.08em; }
      .title    { font-family: 'Anton', 'Arial Narrow', 'Arial Black', sans-serif; font-size: 96px; fill: #FFFFFF; letter-spacing: -1px; }
      .subtitle { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 22px; fill: #0F0E0C; }
    </style>
    <filter id="photo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Bord déchiqueté (moitié droite du billet arrachée) -->
    <clipPath id="tear-edge" clipPathUnits="objectBoundingBox">
      <polygon points="0,0 0.60,0 0.66,0.07 0.55,0.15 0.68,0.24 0.57,0.32 0.64,0.41 0.52,0.50 0.67,0.58 0.56,0.68 0.63,0.76 0.54,0.85 0.62,0.93 0.55,1.0 0,1.0"/>
    </clipPath>
  </defs>

  <rect class="bg" width="1200" height="630"/>

  <text x="1140" y="60" text-anchor="end" class="meta">PULSE CX · ÉDITION 01 · AVRIL 2026</text>

  <text x="60" y="210" class="title">LA VÉRITÉ</text>
  <text x="60" y="306" class="title">SUR UN TRANSFERT</text>
  <text x="60" y="402" class="title">QUI N'ARRIVE JAMAIS</text>

  <text x="60" y="448" class="subtitle">Ce qu'un virement Banque → Mobile Money avorté révèle du CX en UEMOA</text>

  <!-- Billet 10 000 FCFA, rotation -12° (chute libre), clip bord déchiqueté, ombre portée -->
  <g transform="rotate(-12 920 304)" filter="url(#photo-shadow)">
    <image href="../assets/photo-ed01-billet.png"
           x="770" y="178" width="500" height="253"
           preserveAspectRatio="xMidYMid meet"
           clip-path="url(#tear-edge)"/>
  </g>

  <g transform="translate(475, 545) scale(0.50)" fill="#0F0E0C">
    <text x="0" y="82" font-family="'Archivo Black', 'Arial Black', Helvetica, sans-serif" font-size="94" letter-spacing="-2">PULSE</text>
    <text x="310" y="82" font-family="'Archivo', Arial, Helvetica, sans-serif" font-weight="300" font-size="72" letter-spacing="0">CX</text>
    <path d="M 8 106 C 130 152 330 152 458 112" stroke="#0F0E0C" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="458" cy="112" r="9"/>
  </g>
</svg>
