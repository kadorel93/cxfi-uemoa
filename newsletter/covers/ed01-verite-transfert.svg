<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pulse CX · Édition 01 · Avril 2026
  Sujet : PI-SPI, transfert Banque → Mobile Money échoué, silence client UEMOA
  Concept V-D : billet 10 000 FCFA déchiré en deux bandes horizontales avec gap

  Export PNG : python3 newsletter/render.py newsletter/covers/ed01-verite-transfert.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Playfair+Display:ital,wght@0,500;1,500&amp;family=Archivo+Black&amp;family=Archivo:wght@300&amp;display=swap');
      .bg       { fill: #FADA00; }
      .title    { font-family: 'Anton', 'Arial Narrow', 'Arial Black', sans-serif; font-size: 96px; fill: #FFFFFF; letter-spacing: -1px; }
      .subtitle { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 22px; fill: #0F0E0C; }
    </style>
    <filter id="photo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Bande supérieure : bord inférieur en zigzag -->
    <clipPath id="tear-upper" clipPathUnits="objectBoundingBox">
      <polygon points="0,0 1,0 1,0.38 0.92,0.44 0.80,0.40 0.68,0.46 0.55,0.42 0.42,0.47 0.30,0.41 0.18,0.45 0.08,0.40 0,0.43"/>
    </clipPath>
    <!-- Bande inférieure : bord supérieur en zigzag -->
    <clipPath id="tear-lower" clipPathUnits="objectBoundingBox">
      <polygon points="0,0.57 0.10,0.62 0.20,0.58 0.32,0.64 0.45,0.59 0.58,0.63 0.70,0.58 0.82,0.62 0.92,0.59 1,0.62 1,1 0,1"/>
    </clipPath>
  </defs>

  <rect class="bg" width="1200" height="630"/>

  <!-- Billet d'abord pour que le titre passe au-dessus -->
  <g transform="rotate(-8 920 304)" filter="url(#photo-shadow)">
    <image href="../assets/photo-ed01-billet.png"
           x="720" y="180" width="460" height="233"
           preserveAspectRatio="xMidYMid meet"
           clip-path="url(#tear-upper)"/>
  </g>
  <g transform="rotate(-8 920 304) translate(0 28)" filter="url(#photo-shadow)">
    <image href="../assets/photo-ed01-billet.png"
           x="720" y="180" width="460" height="233"
           preserveAspectRatio="xMidYMid meet"
           clip-path="url(#tear-lower)"/>
  </g>

  <!-- Titre 4 lignes, par-dessus le billet -->
  <text x="60" y="170" class="title">LA VÉRITÉ</text>
  <text x="60" y="266" class="title">SUR UN TRANSFERT</text>
  <text x="60" y="362" class="title">QUI N'ARRIVE JAMAIS</text>
  <text x="60" y="458" class="title">UEMOA</text>
  <text x="60" y="504" class="subtitle">Ce qu'un virement Banque → Mobile Money avorté révèle du CX en UEMOA</text>

  <!-- Logo Pulse CX en signature -->
  <g transform="translate(528, 576) scale(0.30)" fill="#0F0E0C">
    <text x="0" y="82" font-family="'Archivo Black', 'Arial Black', Helvetica, sans-serif" font-size="94" letter-spacing="-2">PULSE</text>
    <text x="340" y="82" font-family="'Archivo', Arial, Helvetica, sans-serif" font-weight="300" font-size="72" letter-spacing="0">CX</text>
    <path d="M 8 106 C 130 152 330 152 468 112" stroke="#0F0E0C" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="468" cy="112" r="9"/>
  </g>
</svg>
