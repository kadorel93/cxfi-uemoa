# Forcer goxen.co comme seul domaine public — cxfi-uemoa.netlify.app redirige vers goxen.co
[[redirects]]
  from = "https://cxfi-uemoa.netlify.app/*"
  to = "https://goxen.co/:splat"
  status = 301
  force = true

# Rediriger l'ancienne URL /admin vers 404 pour ne pas révéler l'existence d'un panneau
[[redirects]]
  from = "/admin"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/admin.html"
  to = "/404"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com https://www.gstatic.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://yyrjbrwrywbcusiivsgy.supabase.co; img-src 'self' data: https:; frame-ancestors 'none';"
